version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: researcher
      POSTGRES_PASSWORD: research_pass
      POSTGRES_DB: deep_research
    volumes:
      # Named volume = data survives container restarts and rebuilds
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # FastAPI won't connect until PostgreSQL reports it is fully ready
      test: ["CMD-SHELL", "pg_isready -U researcher -d deep_research"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
