model_list:
  # ==========================================
  # THE ORCHESTRATOR MODEL (Reasoning/Planning)
  # ==========================================
  - model_name: orchestrator-model
    litellm_params:
      # If using OpenRouter, LiteLLM requires the "openrouter/" prefix!
      model: openrouter/openai/gpt-4o-mini
      api_key: os.environ/OPEN_ROUTER_API_KEY
      
  # ==========================================
  # THE WORKER MODEL (Fast, Parallel scraping)
  # ==========================================
  - model_name: worker-model
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct
      api_key: os.environ/OPEN_ROUTER_API_KEY

litellm_settings:
  # Track spending and set a hard budget cap as requested
  max_budget: 1.50
  
  # How many times to retry an API call before moving to fallback
  num_retries: 2
  
  # Return standardized error codes
  drop_params: true
