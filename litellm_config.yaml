model_list:
  # ==========================================
  # THE ORCHESTRATOR MODEL (Brain)
  # ==========================================
  - model_name: orchestrator-model
    litellm_params:
      model: huggingface/MiniMaxAI/MiniMax-M2.5 
      api_key: os.environ/HUGGINGFACE_API_KEY
      
  # ==========================================
  # THE WORKER MODEL GROUP (Auto-Failover!)
  # ==========================================
  # If Gemini hits a 429, LiteLLM instantly tries Llama and Qwen!
  - model_name: worker-model
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
  # - model_name: worker-model
  #   litellm_params:
  #     model: huggingface/meta-llama/Llama-4-8B-Instruct
  #     api_key: os.environ/HUGGINGFACE_API_KEY
  - model_name: worker-model
    litellm_params:
      model: huggingface/meta-llama/Llama-3.1-8B-Instruct
      api_key: os.environ/HUGGINGFACE_API_KEY

litellm_settings:
  # Track spending and set a hard budget cap as requested
  max_budget: 1.50
  
  # How many times to retry an API call before moving to fallback
  num_retries: 3
  
  # Return standardized error codes
  drop_params: true
